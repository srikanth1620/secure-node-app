name: Build and Deploy Node.js Container to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  semgrep:
    name: semgrep/ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep Scan
        run: semgrep ci

  build-and-push:
    name: Build, Push to ACR & Deploy
    needs: semgrep
    if: always() && needs.semgrep.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_2C34E57C1C224509ABA03A55CEBFE2F9 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_E908A152458348C3B2528C8B384DC577 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_868CDA1925B9444091C67DED9736EEFE }}

      # Recommended way: Use docker/login-action with Service Principal
      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: securenodeacr.azurecr.io
          username: ${{ secrets.AZUREAPPSERVICE_CLIENTID_2C34E57C1C224509ABA03A55CEBFE2F9 }}
          password: ${{ secrets.AZURE_CLIENT_SECRET }}

      - name: Build and push Docker image to ACR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            securenodeacr.azurecr.io/secure-node-app:${{ github.sha }}
            securenodeacr.azurecr.io/secure-node-app:latest

      - name: Deploy container to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'secure-node-app-123'
          slot-name: 'Production'
          images: 'securenodeacr.azurecr.io/secure-node-app:${{ github.sha }}'