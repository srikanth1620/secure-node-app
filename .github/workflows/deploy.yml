name: Build and Deploy Node.js Container to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  semgrep:
    name: semgrep/ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep Scan
        run: semgrep ci

  build-and-push:
    name: Build, Push to ACR & Deploy
    needs: semgrep
    if: always() && needs.semgrep.result == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Set environment variables for az login
      - name: Login to Azure using Client Secret
        run: |
          az login --service-principal \
            -u ${{ secrets.AZURE_CLIENT_ID }} \
            -p ${{ secrets.AZURE_CLIENT_SECRET }} \
            --tenant ${{ secrets.AZURE_TENANT_ID }}

      - name: Log in to Azure Container Registry
        run: az acr login --name securenodeACR

      - name: Build and push Docker image to ACR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            securenodeacr.azurecr.io/secure-node-app:${{ github.sha }}
            securenodeacr.azurecr.io/secure-node-app:latest

      - name: Deploy container to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'secure-node-app-123'
          slot-name: 'Production'
          images: 'securenodeacr.azurecr.io/secure-node-app:${{ github.sha }}'