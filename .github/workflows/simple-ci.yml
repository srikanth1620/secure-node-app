name: Simple CI Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run fake tests
        run: |
          echo "Pretending to run tests..."
          echo "All tests passed! 🎉"
          exit 0   # Always succeed; change to exit 1 later to test failuregi